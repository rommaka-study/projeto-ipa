name: Gerar Todos os Áudios

on:
  workflow_dispatch:

jobs:
  gerar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar gTTS
        run: pip install gtts

      - name: Executar script de áudio
        run: python gerar_audios.py

      - name: Listar arquivos gerados
        run: |
          echo "=== ARQUIVOS GERADOS ==="
          find cursos/ -name "*.mp3" -type f
